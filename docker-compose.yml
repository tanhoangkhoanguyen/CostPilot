services:
  postgres:
    image: postgres:16-alpine
    container_name: costpilot-postgres
    environment:
      POSTGRES_DB: costpilot
      POSTGRES_USER: costpilot
      POSTGRES_PASSWORD: costpilot
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U costpilot -d costpilot"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: costpilot-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
  redis-data:
