spring:
  application:
    name: costpilot
  threads:
    virtual:
      enabled: true
  # Postgres + Redis from docker-compose. No JDBC/Redis clients on the classpath
  # yet (Stage 0.3 adds Flyway/JPA), so these are wiring targets, not live connections.
  datasource:
    url: jdbc:postgresql://${COSTPILOT_DB_HOST:localhost}:${COSTPILOT_DB_PORT:5432}/${COSTPILOT_DB_NAME:costpilot}
    username: ${COSTPILOT_DB_USER:costpilot}
    password: ${COSTPILOT_DB_PASSWORD:costpilot}
  data:
    redis:
      host: ${COSTPILOT_REDIS_HOST:localhost}
      port: ${COSTPILOT_REDIS_PORT:6379}
  jpa:
    # Flyway owns the schema; Hibernate only checks that entities match it.
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

server:
  port: 8080

costpilot:
  # Embedded mock LLM upstream - default upstream so dev + tests cost $0.
  mock-upstream:
    enabled: true
  upstream:
    # mock -> embedded mock server in this app; real -> provider endpoints below
    mode: ${COSTPILOT_UPSTREAM_MODE:mock}
    openai:
      base-url: ${COSTPILOT_UPSTREAM_OPENAI_BASE_URL:https://api.openai.com}
      api-key: ${COSTPILOT_UPSTREAM_OPENAI_API_KEY:}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
