spring:
  application:
    name: costpilot
  threads:
    virtual:
      enabled: true
  # Postgres + Redis from docker-compose. No JDBC/Redis clients on the classpath
  # yet (Stage 0.3 adds Flyway/JPA), so these are wiring targets, not live connections.
  datasource:
    url: jdbc:postgresql://${COSTPILOT_DB_HOST:localhost}:${COSTPILOT_DB_PORT:5432}/${COSTPILOT_DB_NAME:costpilot}
    username: ${COSTPILOT_DB_USER:costpilot}
    password: ${COSTPILOT_DB_PASSWORD:costpilot}
  data:
    redis:
      host: ${COSTPILOT_REDIS_HOST:localhost}
      port: ${COSTPILOT_REDIS_PORT:6379}
  jpa:
    # Flyway owns the schema; Hibernate only checks that entities match it.
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  # 5.2: usage-event stream. Off by default so dev/tests without a broker still boot;
  # docker-compose and real deploys set COSTPILOT_KAFKA_ENABLED=true.
  kafka:
    bootstrap-servers: ${COSTPILOT_KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      acks: all
      properties:
        enable.idempotence: true
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

server:
  port: 8080

costpilot:
  # 5.2: append-only usage events -> Kafka (off the hot path). Disabled by default.
  kafka:
    enabled: ${COSTPILOT_KAFKA_ENABLED:false}
    usage-events-topic: ${COSTPILOT_KAFKA_USAGE_TOPIC:costpilot.usage-events}
    dlq-topic: ${COSTPILOT_KAFKA_DLQ_TOPIC:costpilot.usage-events.dlq}
  # 5.3/5.4: OLAP sink + read side. Second, non-primary datasource - Flyway/JPA stay on
  # Postgres. Disabled by default so dev/tests without ClickHouse still boot.
  clickhouse:
    enabled: ${COSTPILOT_CLICKHOUSE_ENABLED:false}
    jdbc-url: jdbc:ch://${COSTPILOT_CLICKHOUSE_HOST:localhost}:${COSTPILOT_CLICKHOUSE_PORT:8123}/costpilot
    username: ${COSTPILOT_CLICKHOUSE_USER:default}
    password: ${COSTPILOT_CLICKHOUSE_PASSWORD:}
  # Embedded mock LLM upstream - default upstream so dev + tests cost $0.
  mock-upstream:
    enabled: true
  upstream:
    # mock -> embedded mock server in this app; real -> provider endpoints below.
    # switching provider endpoints is env/config only - never a code change.
    mode: ${COSTPILOT_UPSTREAM_MODE:mock}
    providers:
      openai:
        base-url: ${COSTPILOT_UPSTREAM_OPENAI_BASE_URL:https://api.openai.com}
        api-key: ${COSTPILOT_UPSTREAM_OPENAI_API_KEY:}
      anthropic:
        base-url: ${COSTPILOT_UPSTREAM_ANTHROPIC_BASE_URL:https://api.anthropic.com}
        api-key: ${COSTPILOT_UPSTREAM_ANTHROPIC_API_KEY:}
      gemini:
        base-url: ${COSTPILOT_UPSTREAM_GEMINI_BASE_URL:https://generativelanguage.googleapis.com}
        api-key: ${COSTPILOT_UPSTREAM_GEMINI_API_KEY:}
    # explicit model -> provider overrides; anything unlisted falls back to
    # model-id prefix convention (claude* -> anthropic, gemini* -> gemini, else openai)
    model-providers: {}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
