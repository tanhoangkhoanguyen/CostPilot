name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      # warm the heavy testcontainers images so pulls don't eat into test timeouts
      - name: Pre-pull container images
        run: |
          docker pull postgres:16-alpine &
          docker pull redis:7-alpine &
          docker pull apache/kafka:3.8.0 &
          docker pull clickhouse/clickhouse-server:24-alpine &
          wait

      # build = compile + test (testcontainers) + jacoco coverage gate via check
      - name: Build, test, coverage gate
        run: ./gradlew build --no-daemon

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: build/reports/jacoco/test/html
          if-no-files-found: ignore

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: build/reports/tests/test
          if-no-files-found: ignore
